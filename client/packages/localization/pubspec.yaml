name: localization
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.22.1"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter
  flutter_localization: ^0.1.12
  intl: ^0.20.0
  shared_preferences: ^2.2.0
  auto_route: any

  common:
    path: ../common

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any

  build_runner: ^2.4.6
  json_serializable: ^6.7.1
  freezed: ^2.4.1
  auto_route_generator: any
  arb_generator: ^0.0.3

flutter:
  generate: true

arb_generator:
  input_filepath: "assets/translations.csv"
  output_directory: "arb"
  filename_prepend: "app_"
  csv_settings:
    delimiter: ","
    base_index: 1
