server {
    listen 443 ssl;
    server_name registry.smart-home-pnz.ru;

    ssl_certificate /etc/letsencrypt/live/registry.smart-home-pnz.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/registry.smart-home-pnz.ru/privkey.pem;

     client_max_body_size 1G;
     
    location / {
        proxy_pass http://registry:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
