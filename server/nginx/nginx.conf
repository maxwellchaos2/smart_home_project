http {
    include       mime.types;
    include /etc/nginx/conf.d/*.conf;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    upstream backend {
        server server:8080;
    }


    # HTTP + WS (без TLS)
    server {
        listen 80;
        server_name api.smart-home-pnz.ru;

        # ACME HTTP-01 challenge endpoint for Certbot renewals
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type text/plain;
            try_files $uri =404;
            access_log off;
        }

        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection ""; # disable Connection: keep-alive chunk for ws fallback
            proxy_read_timeout 60s;
        }

        location /ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
        }
    }

    server {
        listen 443 ssl http2;
        server_name api.smart-home-pnz.ru;

        ssl_certificate /etc/letsencrypt/live/api.smart-home-pnz.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.smart-home-pnz.ru/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
        }

        location /ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
        }
        
        location /uploads/ {
            alias /app/uploads/;
            autoindex off;
            expires max;
            add_header Cache-Control public;
            access_log off;
            
            # Разрешаем только определенные типы файлов
            location ~* \.(svg)$ {
                try_files $uri =404;
            }
        }
    }
}