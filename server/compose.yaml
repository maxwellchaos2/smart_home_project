services:
  server:
    build: .
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - db
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=${DB_HOST}
      - PORT=${PORT}
      - YANDEX_CLIENT_SECRET=${YANDEX_CLIENT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - YANDEX_DIALOGS_SKILL_ID=${YANDEX_DIALOGS_SKILL_ID}
      - YANDEX_DIALOGS_OAUTH_TOKEN=${YANDEX_DIALOGS_OAUTH_TOKEN}
    networks:
      - app-network

  db:
    image: postgres:14.15-alpine3.21
    restart: always
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: smart_home
    ports:
      - "5432:5432"
    networks:
      - app-network

  nginx:
    image: nginx:stable-perl
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./uploads:/app/uploads
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
      - nginx-reload:/tmp/nginx-reload
      # - registry-data:/var/lib/registry
      # - ./nginx/registry.conf:/etc/nginx/conf.d/registry.conf
    depends_on:
      - server
      # - registry
    networks:
      - app-network
    entrypoint: >
      /bin/sh -c "
      while :; do
        if [ -f /tmp/nginx-reload/reload ]; then
          echo 'Reloading nginx configuration...'
          nginx -s reload && rm -f /tmp/nginx-reload/reload
        fi
        sleep 10
      done &
      exec nginx -g 'daemon off;'
      "

  certbot:
    image: certbot/certbot
    restart: always
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
      - nginx-reload:/tmp/nginx-reload
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do sleep 12h & wait $${!};
      if certbot renew --webroot -w /var/www/certbot; then
        echo 'Certificates renewed, signaling nginx to reload...'
        touch /tmp/nginx-reload/reload
      fi;
      done;"

  # registry:
  #   image: registry:2
  #   restart: always
  #   environment:
  #     REGISTRY_AUTH: htpasswd
  #     REGISTRY_AUTH_HTPASSWD_REALM: "Registry Realm"
  #     REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
  #   volumes:
  #     - registry-data:/var/lib/registry
  #     - ./registry/auth:/auth
  #   networks:
  #     - app-network

networks:
  app-network:
    driver: bridge

volumes:
  certbot-etc:
  certbot-www:
  nginx-reload:
  # registry-data:
