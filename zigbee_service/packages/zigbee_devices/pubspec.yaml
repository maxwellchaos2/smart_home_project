environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  dio: any
  retrofit: any
  freezed_annotation: any
  json_annotation: any

  devices: any
  common: any

dependency_overrides:
  devices:
    git:
      url: https://github.com/Zotov-Dev/smart_home-shared_packages.git
      path: devices
      ref: v1.3.0

  common:
    git:
      url: https://github.com/Zotov-Dev/smart_home-shared_packages.git
      path: common
      ref: v1.3.0

dev_dependencies:
  flutter_lints: any
  retrofit_generator: any
  build_runner: any
  json_serializable: any
  freezed: any
  auto_route_generator: any
